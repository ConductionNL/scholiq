name: Documentation

on:
  push:
    branches: [development, documentation]
  pull_request:
    branches: [development, documentation]

jobs:
  deploy:
    # Reusable workflow defaults source-folder to `docs/` — the
    # Docusaurus site now lives there (journeydoc / ADR-030), replacing
    # the pre-ADR stand-alone `docusaurus/` folder.
    uses: ConductionNL/.github/.github/workflows/documentation.yml@main
    with:
      cname: scholiq.conduction.nl
