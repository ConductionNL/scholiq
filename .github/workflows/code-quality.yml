name: Code Quality

on:
  push:
    branches: [main, development, feature/**, bugfix/**, hotfix/**]
  pull_request:
    branches: [main, master, development, beta]
  workflow_dispatch:

jobs:
  quality:
    uses: ConductionNL/.github/.github/workflows/quality.yml@main
    with:
      app-name: scholiq
      php-version: "8.3"
      php-test-versions: '["8.3", "8.4"]'
      # appinfo/info.xml requires <nextcloud min-version="33"/>, so only stable33+.
      nextcloud-test-refs: '["stable33"]'
      enable-psalm: true
      enable-phpstan: true
      enable-phpmetrics: true
      enable-frontend: true
      enable-eslint: true
      enable-phpunit: true
      enable-newman: true
      # scholiq's info.xml declares <app>openregister</app>/<app>openconnector</app>
      # and Application.php registers listeners for OR lifecycle events; OR's
      # `development` carries ObjectCreatedEvent/ObjectTransitionedEvent + the
      # IMcpToolProvider interface the ScholiqToolProvider tests need.
      additional-apps: '[{"repo":"ConductionNL/openregister","app":"openregister","ref":"development"}]'
      enable-sbom: true
