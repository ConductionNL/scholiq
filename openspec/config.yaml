schema: conduction

app:
  slug: scholiq
  name: Scholiq
  description: Open-source education platform for Nextcloud — student tracking (leerlingvolgsysteem), course creation, eLearning, training management, and certification.
  repository: https://codeberg.org/Conduction/scholiq
  license: EUPL-1.2
  version: 0.1.0
  status: idea
  family: concept
  predecessors:
    - learniq
    - edudesk
  categories:
    - education
    - learning-management
    - lvs

spec_dir: openspec/specs
changes_dir: openspec/changes

context: |
  Project: Scholiq
  Repo: ConductionNL/scholiq
  Type: Nextcloud App (PHP backend + Vue 2 frontend)
  Description: Open-source education platform — LVS (leerlingvolgsysteem), LMS course creation, eLearning, training management, certification, and exam delivery for PO/VO/MBO/HO and corporate/government training.
  Key components: Course, Module, Lesson, Enrolment, Cohort, Exam, ItemBank, Certificate, OPP, Grade, AbsenceRecord, BronExchange, OsoDossier, ProctoringSession
  Database: PostgreSQL (via OpenRegister's ObjectService)
  Mount path: /var/www/html/custom_apps/scholiq

  Standards:
    Primary content/runtime: cmi5 + xAPI (with SCORM 1.2/2004 compatibility shim)
    Assessment: IMS QTI 3.0 (1EdTech), Caliper Analytics
    Interoperability: LTI 1.3, Common Cartridge, OAI-PMH, NL LOM, VDEX
    Credentials: EDCI / Europass, Open Badges 3.0, E-Portfolio NL
    NL onderwijs gatekeepers: Edukoppeling, Edu-K, UWLR, OSO, ROD/BRON (DUO), ROSA, SchoolID, ECK iD
    Identity: SURFconext (eduPersonAffiliation, eduGAIN), DigiD, eHerkenning, Studielink
    Privacy / compliance: AVG (GDPR), AVG-Onderwijs, EU AI Act (Reg. 2024/1689), BIO/BIO2, Digikoppeling, NIS2 / Cyberbeveiligingswet
    Higher Ed: Open Onderwijs API (OOAPI 5.0), Bologna Diploma Supplement, ECTS

  Architecture:
    Pattern: Thin client — Scholiq owns no database tables
    Data layer: OpenRegister (JSON object storage with schema validation)
    Frontend: Vue 2.7 + Pinia stores querying OpenRegister API directly
    Shared library: @conduction/nextcloud-vue (components, stores, composables, NL Design CSS)
    Backend: Minimal — SettingsController + ConfigurationService for register setup; thin orchestrators for SCORM/cmi5/QTI runtime, BRON/OSO/UWLR adapters live in OpenConnector
    Nextcloud reuse: Files (IRootFolder for course content), Talk (IBroker for virtual classroom), Calendar (IManager for lesson/exam scheduling), Groups (IGroupManager for cohorts), Notifications (IManager for assignment reminders), user-saml (SURFconext SSO), Activity (IManager)

  Sister apps:
    - openregister (REQUIRED — data layer, multi-tenancy, audit trail, REST API)
    - openconnector (REQUIRED — BRON/ROD, UWLR, OSO, Edukoppeling, Studielink, Digikoppeling adapters)
    - mydash (RECOMMENDED — student/credential analytics surfaces)
    - docudesk (OPTIONAL — diploma/certificate document templating)
  Shared specs: See ../openspec/specs/ for cross-project conventions
  Project guidelines: See ../project.md for workspace-wide standards
  Architecture: See docs/ARCHITECTURE.md for standards research and data model decisions
  Features: See docs/FEATURES.md for competitive analysis and feature roadmap (354 canonical features, 71 must, 229 should)

depends_on:
  required:
    - openregister
    - openconnector
  recommended:
    - mydash
  optional:
    - docudesk

