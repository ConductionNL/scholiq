rules:
  proposal:
    - Reference shared nextcloud-app spec for app structure requirements
    - Reference docs/ARCHITECTURE.md for data model and standards decisions
    - Consider impact on OpenConnector adapters (BRON/UWLR/OSO/Edukoppeling/Studielink) before proposing new integrations
    - Reference docs/FEATURES.md for feature tier (must/should/could → MVP/V1/Enterprise)
    - "ADR-011: Check OpenRegister core for existing functionality before proposing new features"
    - "ADR-005 (planned): Any AI feature in scope for EU AI Act high-risk classification (adaptive learning, proctoring) MUST be feature-flag-gated and audit-logged"
  specs:
    - Use Schema.org type annotations for all entities (schema:Course, schema:CourseInstance, schema:EducationalOccupationalCredential, schema:EducationEvent, schema:Person)
    - Include Edu-K/UWLR/OSO/ROD mapping column where applicable
    - Pseudonymise pupil identifiers via SchoolID + ECK iD; never expose BSN
    - Specify which Nextcloud OCP interfaces are used for integration features
    - Reference FEATURES.md tier (must/should/could) for each requirement
    - "ADR-009: Include test scenarios for all MUST/SHALL requirements"
    - "ADR-005 (planned): Identity federation via SURFconext (HE), Nextcloud user-saml (K-12), Studielink (HO enrolment), DigiD (parent/pupil consent)"
  design:
    - Uses OpenRegister API directly from frontend (no own backend CRUD)
    - Register config in lib/Settings/scholiq_register.json (OpenAPI 3.0.0 format)
    - Imported via ConfigurationService::importFromApp() in repair step
    - Reference Nextcloud OCP interfaces for all platform integrations
    - "ADR-001: All data MUST be stored via OpenRegister — no custom database tables"
    - "ADR-006 (planned): BRON/ROD + UWLR + OSO + Edukoppeling adapters MUST live in OpenConnector — never inline HTTP from Scholiq"
    - "ADR-012: MUST use @conduction/nextcloud-vue components (CnIndexPage, CnDashboardPage, CnFormDialog, CnDataTable, CnDetailPage, CnObjectSidebar) — do NOT create custom equivalents"
    - "ADR-008: Follow Controller → Service → Mapper layering pattern"
    - "ADR-003: MUST use NL Design System tokens via Nextcloud CSS variables — no hardcoded colors"
    - "ADR-002 (planned): Content runtime — cmi5 + xAPI primary, SCORM compatibility shim only"
    - MUST use Vue Router (hash mode) for all navigation
    - Router file at src/router/index.js, registered in main.js, <router-view /> in App.vue
  tasks:
    - Tag tasks with feature tier (must/should/could → MVP/V1/Enterprise)
    - Test with OpenRegister to verify schema validation works
    - Verify Nextcloud integration features with actual OCP interfaces
    - Test BRON/OSO/UWLR exchange flows against DUO sandbox
    - "ADR-010: MUST include documentation task with browser screenshots using Playwright MCP"
    - "ADR-009: MUST include unit test tasks — minimum 75% coverage for new code"
    - "ADR-005: MUST include i18n tasks — Dutch and English translations required"
    - "ADR-010: Every user-facing feature MUST have docs in docs/features/ with screenshots"
