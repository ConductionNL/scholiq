name: conduction
version: 1
parent: spec-driven   # heavily customized fork — most upstream changes are intentional
description: "Conduction's spec-driven workflow with GitHub Issues integration and Ralph Wiggum loops (+ optional: discovery, contract, migration, test-plan)"
artifacts:
  - id: proposal
    generates: proposal.md
    description: Captures intent, scope, affected projects, and rollback plan
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.
      Follow the template structure exactly.

      Sections:
      - **Summary**: One paragraph describing what this change does and why.
      - **Motivation**: Why is this change needed? What problem does it solve? Why now?
      - **Affected Projects**: Which projects in apps-extra does this touch? Use checkboxes:
        `- [ ] Project: <project-name> — <what changes>`
      - **Scope**:
        - **In Scope**: What this change WILL do (be specific)
        - **Out of Scope**: What this change will NOT do (set clear boundaries)
      - **Approach**: High-level technical approach — details go in design.md
      - **New Dependencies**: Any new packages, libraries, or external services this change introduces.
      - **Impact**: What code, APIs, or systems are affected by this change.
      - **Cross-Project Dependencies**: Does this depend on or affect other projects?
      - **Risks**: Known risks, assumptions, or failure modes. Format each as `### Risk N: <title>` with **Severity** (High/Medium/Low) and **Mitigation**. Order by severity: High first, then Medium, then Low. Omit if there are genuinely no risks worth calling out.
      - **Rollback Strategy**: How to revert this change if something goes wrong
      - **Open Questions**: Anything that needs clarification before proceeding. Omit if none.

      IMPORTANT: The Affected Projects section creates the contract between
      proposal and specs phases. Research existing specs before filling this in.
      Each project listed here will likely need corresponding spec files.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" -
      implementation details belong in design.md.

      This is the foundation - specs, design, and tasks all build on this.
    requires: []
  - id: discovery
    generates: discovery.md
    optional: true
    skipWhen: "The approach is clear and no technical uncertainty is identified in the proposal — no open questions about API feasibility, framework compatibility, or cross-project viability"
    description: Time-boxed research output — what was tried, learned, and recommended (optional, use before specs when approach is uncertain)
    template: discovery.md
    instruction: |
      Create a discovery document that captures the outcome of a time-boxed research effort.
      Use this when the proposal identifies uncertainty about Nextcloud API availability, framework compatibility, or cross-project feasibility — before committing to a full spec + design.

      Sections:
      - **Question**: The specific question or uncertainty this discovery addresses.
      - **Approach Taken**: What was tried — OCP interfaces checked, existing app code reviewed, docs read, POC built.
      - **Findings**: What was learned, including Nextcloud-specific constraints, surprises, and limitations.
      - **Recommendation**: Go with X because Y — or: do not proceed with X because Z. Be decisive.
      - **Risks Uncovered**: New risks or unknowns surfaced during this discovery. Omit if none.
      - **Next Steps**: What should happen now — proceed to specs, run another discovery, revisit the proposal?

      Keep it concise. This is a research note, not a spec. The goal is to answer the question and unblock the next step.
    requires:
      - proposal
  - id: contract
    generates: contract.md
    optional: true
    skipWhen: "The change does not affect cross-project interfaces — skip when ALL of: (1) only one project in Affected Projects, (2) Cross-Project Dependencies is 'None', (3) no new or modified API endpoints, REST routes, or shared data schemas that other apps consume, (4) no breaking changes to existing interfaces"
    description: Formal API contract — endpoints, schemas, error codes — for cross-project alignment before implementation (optional)
    template: contract.md
    instruction: |
      Create an API contract document that defines the formal interface between producer and consumer(s) before implementation begins.
      Use this when a change introduces or modifies API endpoints consumed by other projects in apps-extra.

      This document MUST be reviewed and accepted by all consuming projects before implementation starts.

      Sections:
      - **Consumers**: Which projects or services in apps-extra consume this API.
      - **Endpoints**: For each endpoint: method, path, auth required, request schema, response schema (success + errors).
      - **Error Codes**: Table of all error codes this API returns with conditions.
      - **Versioning**: API version, backward compatibility guarantees.
      - **Breaking Change Policy**: How breaking changes will be communicated and coordinated across projects.
      - **SLA**: Expected response time and availability expectations.

      Follow company-wide ADR-002 (API conventions) for endpoint naming, response structure, and error format.
    requires:
      - proposal
  - id: specs
    generates: "specs/**/*.md"
    description: Delta specs with ADDED/MODIFIED/REMOVED requirements using RFC 2119 keywords
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Read `~/.github/docs/claude/writing-specs.md` for the full spec writing guide — it covers RFC 2119 keywords, scenario format, good vs bad examples, and the canonical spec structure for new capability specs.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from openspec/specs/<capability>/ when creating the delta spec at specs/<capability>/spec.md.

      Delta operations (use ## headers):
      - **Requirements**: New capabilities in a new spec (use **ADDED Requirements** when adding to an existing spec)
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format
      - RENAMED Requirements SHOULD include an HTML comment `<!-- No behavior change — rename only -->` to make intent explicit during review

      Format requirements:
      - Each requirement: `### REQ-{NNN}: <name>` followed by description (sequential numbers starting at REQ-001 for new specs; next free number for ADDED requirements in existing specs)
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with GIVEN/WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      MODIFIED requirements workflow:
      1. Locate the existing requirement in openspec/specs/<capability>/spec.md
      2. Copy the ENTIRE requirement block (from `### REQ-{NNN}:` through all scenarios)
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
      4. Ensure header text matches exactly (whitespace-insensitive)

      Common pitfall: Using MODIFIED with partial content loses detail at archive time. If adding new concerns without changing existing behavior, use ADDED instead.

      Specs MUST be testable - each scenario is a potential test case.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical approach, API definitions, database changes, Nextcloud patterns
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      When to include design.md (create only if any apply):
      - Cross-cutting change (multiple services/modules) or new architectural pattern
      - New external dependency or significant data model changes
      - Security, performance, or migration complexity
      - Ambiguity that benefits from technical decisions before coding

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered for each decision.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation and specs for requirements.

      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal
  - id: migration
    generates: migration.md
    optional: true
    skipWhen: "The change does not introduce or modify database tables, columns, OpenRegister schema definitions, or data transformations — confirmed by design.md showing no backend or schema impact"
    description: Database/schema migration plan with Nextcloud migration class outline and rollback procedure (optional, use when design introduces schema changes)
    template: migration.md
    instruction: |
      Create a migration plan for database or schema changes.
      Use this when the design introduces new tables, columns, schema changes, or data transformations.

      Follow Nextcloud's migration framework — each migration is a versioned class in `lib/Migration/`.

      Sections:
      - **Current State**: What the schema/data looks like before this change.
      - **Target State**: What the schema/data should look like after this change.
      - **Migration Class**: Outline the Nextcloud migration class (version number, `changeSchema()` method, key operations).
      - **Migration Steps**: Ordered steps the migration executes. Each step MUST be atomic and verifiable.
      - **Data Impact**: How many records are affected? Is there data loss or transformation? Can it run on live data?
      - **Rollback Procedure**: How to revert if the migration fails — reverse migration class or SQL.
      - **Validation**: How to verify the migration succeeded — queries, checks, expected counts.
    requires:
      - design
  - id: test-plan
    generates: test-plan.md
    optional: true
    skipWhen: "The change is small (≤4 tasks) with clear spec scenarios that already define done — the spec scenarios themselves serve as the test plan"
    description: Maps spec scenarios to named test cases before implementation begins (optional, use to pre-define what done means)
    template: test-plan.md
    instruction: |
      Create a test plan that maps every spec scenario to a concrete test case.
      Use this before implementation to explicitly define what "done" means for each requirement.

      Read `~/.github/docs/claude/writing-specs.md` for scenario format reference.

      For each spec requirement in the change:
      - Extract the spec scenarios
      - Map each to a test case with a type and the appropriate test command
      - Note which persona perspective applies for persona tests

      Test types and commands:
      - **Functional** (browser): `/test-functional` — user-facing behaviour via browser
      - **API**: `/test-api` — REST endpoints, Newman/Postman collections
      - **Persona**: `/test-persona-henk`, `/test-persona-fatima`, `/test-persona-sem`, `/test-persona-priya`, `/test-persona-janwillem`, `/test-persona-mark`, `/test-persona-noor`, `/test-persona-annemarie` — role-based flows
      - **Accessibility**: `/test-accessibility` — WCAG compliance
      - **Performance**: `/test-performance` — load time, API response time
      - **Regression**: `/test-regression` — existing functionality not broken
      - **Security**: `/test-security` — AVG/GDPR compliance, authorisation checks

      Cross-project note: if the change touches multiple affected projects (from the proposal), group test cases by project where it clarifies scope.

      Close with a Coverage Summary listing which requirements are covered and any deliberately untested areas.

      After implementation: TCs that represent ongoing regression value (key user flows, cross-app integrations, compliance checks) should be promoted to reusable test scenarios using `/test-scenario-create`. Those TS files persist after the change is archived and are automatically picked up by `/test-counsel`, `/test-app`, and `/test-persona-*`.
    requires:
      - specs
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with spec refs and file targets, drives GitHub issues
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      the task format to track progress. Tasks not using `- [ ]` checkboxes for the Implement + Test lines won't be tracked.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task uses `### Task N: {{title}}` format with metadata fields
      - Each task MUST include: spec_ref, files, acceptance_criteria, and checkboxes for Implement + Test
      - Tasks MUST be small enough to complete in one session
      - Order tasks by dependency (what MUST be done first?)
      - If migration.md exists, add the migration class implementation as the first task
      - Close with a Verification section and mandatory compliance sections

      Example:
      ```
      ## Implementation Tasks

      ### Task 1: Create data export controller
      - **spec_ref**: `openspec/specs/data-export/spec.md#requirement-export-csv`
      - **files**: `lib/Controller/ExportController.php`, `lib/Service/ExportService.php`
      - **acceptance_criteria**:
        - GIVEN a user requests export WHEN they call GET /api/export THEN a CSV is returned
      - [ ] Implement
      - [ ] Test

      ### Task 2: Add frontend export button
      - **spec_ref**: `openspec/specs/data-export/spec.md#requirement-export-ui`
      - **files**: `src/views/ExportView.vue`
      - **acceptance_criteria**:
        - GIVEN the user is on the list view WHEN they click Export THEN a download starts
      - [ ] Implement
      - [ ] Test

      ## Verification
      - [ ] All tasks checked off
      - [ ] `openspec validate` passes
      - [ ] Manual testing against acceptance criteria
      - [ ] Code review against spec requirements

      ## Tests (company-wide ADR-009)
      <!-- Required for all changes. Mark N/A with justification if not applicable. -->
      - [ ] PHPUnit unit tests for new/changed business logic (`tests/Unit/`)
      - [ ] Newman/Postman tests for new/changed API endpoints
      - [ ] Browser tests (Playwright MCP) for UI changes
      - [ ] All tests pass (`composer test`, `newman run`)

      ## Documentation (company-wide ADR-010)
      <!-- See `.claude/docs/writing-docs.md` for documentation principles. Required for user-facing features. Mark N/A with justification if not applicable. -->
      - [ ] Feature documentation updated in `docs/`
      - [ ] Screenshot captured and committed to `docs/images/`

      ## i18n (company-wide ADR-005)
      <!-- Required when adding user-facing strings. Mark N/A if no new strings. -->
      - [ ] Dutch (`nl_NL`) and English (`en_US`) translation strings added
      ```

      Reference specs for what needs to be built, design for how to build it.
      Each task MUST be verifiable — you know when it's done.
    requires:
      - specs
      - design
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    If migration.md exists, implement the Nextcloud migration class as the very first task before any other implementation.
    If contract.md exists, treat it as the authoritative interface definition — do not deviate from it during implementation.
    Pause if you hit blockers or need clarification.
